name: LinkedIn Job Scraper

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes
  workflow_dispatch:          # allows manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Cron diagnostics (pre-run)
        run: |
          echo "run_id=${GITHUB_RUN_ID} attempt=${GITHUB_RUN_ATTEMPT}"
          echo "cwd=$(pwd)"
          ls -la
          if [ -f seen_jobs.db ]; then
            count=$(sqlite3 seen_jobs.db "select count(*) from seen_jobs;" 2>/dev/null || echo "uninitialized")
            echo "pre-run seen_jobs rows=${count}"
          else
            echo "pre-run seen_jobs.db not found"
          fi

      - name: Run scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Cron diagnostics (post-run)
        if: always()
        run: |
          if [ -f seen_jobs.db ]; then
            count=$(sqlite3 seen_jobs.db "select count(*) from seen_jobs;" 2>/dev/null || echo "uninitialized")
            echo "post-run seen_jobs rows=${count}"
          else
            echo "post-run seen_jobs.db not found"
          fi